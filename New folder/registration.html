<!DOCTYPE html>
<html lang="en">

    <title>Registration</title>
</head>
<body>
    <div style="background-color:rgb(133, 83, 83);color:white;padding:60px;">
        <h1>Registration</h1>
    </div>
<div style="background-color:rgba(220, 161, 144, 0.781);  width: 100% ;padding:60px;
  display:inline-block;">
  <label for="fname">First name:</label><br>
  <input type="text" id="fname" name="fname"><br>
  <label for="lname">Last name:</label><br>
  <input type="text" id="lname" name="lname">
  <br>
    <label for="birthday">Birthday:</label><br>
  <input type="date" id="birthday" name="birthday">
<br>

     <label for="phone">Enter your phone number:</label><br>
  <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">
   <br>
  <label for="html">Gender</label><br>

   <input type="radio" id="html" name="fav_language" >
  <label for="html">Male</label><br>
  <input type="radio" id="css" name="fav_language" >
  <label for="css">Female</label><br>
  <br>
  <label for="myfile" >Select a file:</label><br>
  <input type="file" id="myfile" name="myfile"  >
  <br>
  <br>
  <br>
<input type="button" onclick="alert('Saved')" value="Save">

  

</div>
